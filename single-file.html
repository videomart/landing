<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videomart Broadcast Solutions</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS v4 -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <!-- React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <style type="text/tailwindcss">
        @theme {
            --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
            --font-display: "Outfit", sans-serif;
            --font-mono: "JetBrains Mono", monospace;
            
            /* Refined Futuristic Palette */
            --color-bg-deep: #020617;
            --color-bg-card: #0f172a;
            --color-brand: #4021d9;
            --color-neon-blue: #00f2ff;
            --color-neon-cyan: #22d3ee;
            --color-neon-purple: #8b5cf6;
        }

        @layer base {
            body {
                @apply bg-bg-deep text-slate-200 font-sans antialiased selection:bg-neon-blue/30 selection:text-white;
            }
            
            h1, h2, h3, h4, h5, h6 {
                @apply font-display tracking-tight text-white;
            }
        }

        /* Futuristic Utilities */
        .glass-panel {
            @apply bg-white/5 backdrop-blur-xl border border-white/10 shadow-2xl;
        }

        .neon-text-glow {
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5), 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .neon-border-glow {
            @apply border-neon-blue/30 shadow-[0_0_15px_rgba(0,242,255,0.1)];
        }

        .text-gradient-blue {
            @apply bg-clip-text text-transparent bg-gradient-to-br from-white via-white to-neon-blue;
        }

        .bento-card {
            @apply relative overflow-hidden rounded-[2rem] border border-white/5 bg-white/[0.02] hover:bg-white/[0.05] transition-all duration-500;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .animate-scan {
            animation: scanline 8s linear infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;
        const { 
            Menu, X, Play, Monitor, Settings, Info, Phone, 
            ArrowRight, Shield, Zap, Globe, Cpu, 
            Layers, CheckCircle2, ArrowUpRight, 
            Activity, Server, Database, Share2,
            Instagram, Linkedin, Facebook, Youtube, Mail, MapPin, Clock, Users, Award
        } = LucideReact;

        // --- Navbar Component ---
        function Navbar() {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 20);
                };
                window.addEventListener("scroll", handleScroll);
                return () => window.removeEventListener("scroll", handleScroll);
            }, []);

            const navLinks = [
                { name: "Exibidores", href: "#products", icon: Monitor },
                { name: "Utilitários", href: "#utilities", icon: Settings },
                { name: "Produção", href: "#production", icon: Play },
                { name: "Sobre", href: "#about", icon: Info },
                { name: "Contato", href: "#contact", icon: Phone },
            ];

            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${isScrolled ? "py-4" : "py-8"}`}>
                    <div className="max-w-7xl mx-auto px-6">
                        <div className={`flex items-center justify-between px-8 py-4 rounded-2xl transition-all duration-500 ${
                            isScrolled ? "glass-panel shadow-2xl shadow-neon-blue/5 border-white/10" : "bg-transparent border-transparent"
                        }`}>
                            <motion.div
                                initial={{ opacity: 0, x: -20 }}
                                animate={{ opacity: 1, x: 0 }}
                                className="flex items-center gap-3 group cursor-pointer"
                            >
                                <div className="w-10 h-10 bg-brand rounded-xl flex items-center justify-center shadow-lg shadow-brand/20 group-hover:shadow-neon-blue/40 transition-all duration-500">
                                    <Play className="text-white w-5 h-5 fill-current group-hover:text-neon-blue transition-colors" />
                                </div>
                                <span className="text-xl font-display font-bold tracking-tight text-white group-hover:text-neon-blue transition-colors">
                                    VIDEOMART
                                </span>
                            </motion.div>

                            <div className="hidden md:flex items-center gap-10">
                                {navLinks.map((link, index) => (
                                    <motion.a
                                        key={link.name}
                                        href={link.href}
                                        initial={{ opacity: 0, y: -10 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        transition={{ delay: index * 0.1 }}
                                        className="text-[13px] font-mono font-medium uppercase tracking-widest text-slate-400 hover:text-neon-blue transition-all duration-300 relative group"

                                        {link.name}

                            </div>

                            <button
                                className="md:hidden text-white hover:text-neon-blue transition-colors"
                                onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                            >
                                {isMobileMenuOpen ? <X /> : <Menu />}
                            </button>

                                        key={link.name}

                                ))}

                                    Falar com Especialista
                                </button>
                            </div>
                        </motion.div>

                                        <div className="w-full h-1 bg-neon-blue/20 blur-sm animate-scan absolute top-0" />
                                    </div>
                                </div>
                            </div>

                            <motion.div
                                animate={{ y: [0, -15, 0] }}
                                transition={{ duration: 5, repeat: Infinity, ease: "easeInOut" }}
                                className="absolute -top-8 -right-8 glass-panel p-6 rounded-3xl z-20 border-neon-blue/20"
                            >
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 bg-emerald-500/10 rounded-2xl flex items-center justify-center border border-emerald-500/20">
                                        <Shield className="text-emerald-400 w-6 h-6" />
                                    </div>
                                    <div>
                                        <div className="text-sm font-bold text-white">Redundância</div>
                                        <div className="text-[10px] font-mono text-emerald-400/70 uppercase">High Availability</div>
                                    </div>
                                </div>
                            </motion.div>

                            <motion.div
                                animate={{ y: [0, 15, 0] }}
                                transition={{ duration: 6, repeat: Infinity, ease: "easeInOut", delay: 1 }}
                                className="absolute -bottom-8 -left-8 glass-panel p-6 rounded-3xl z-20 border-brand/20"
                            >
                                <div className="flex items-center gap-4">
                                    <div className="w-12 h-12 bg-brand/10 rounded-2xl flex items-center justify-center border border-brand/20">
                                        <Cpu className="text-brand-light w-6 h-6" />

                                    <div>

                                        <div className="text-[10px] font-mono text-brand-light/70 uppercase">Ultra Low Latency</div>
                                    </div>
                                </div>
                            </motion.div>
